name: Deploy Lambda Functions

on:
  push:
    branches:
      - main
    paths:
      - 'lambdas/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-lambda-layer:
    name: Build and Deploy Lambda Layer
    runs-on: ubuntu-latest
    outputs:
      ingest_layer_arn: ${{ steps.publish-ingest-layer.outputs.layer_arn }}
      query_layer_arn: ${{ steps.publish-query-layer.outputs.layer_arn }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::449112697282:role/RagChatbotGitHubActionsRole
          aws-region: us-east-1

      - name: Build ingest layer
        run: |
          mkdir -p layers/ingest/python
          pip install \
            -r lambdas/ingest/requirements.txt \
            -t layers/ingest/python/ \
            --upgrade
          cd layers/ingest
          zip -r ../../ingest-layer.zip python/
          echo "Ingest layer size:"
          du -sh ../../ingest-layer.zip

      - name: Publish ingest layer to AWS
        id: publish-ingest-layer
        run: |
          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name rag-chatbot-ingest-deps \
            --zip-file fileb://ingest-layer.zip \
            --compatible-runtimes python3.11 \
            --region us-east-1 \
            --query 'LayerVersionArn' \
            --output text)
          echo "layer_arn=$LAYER_ARN" >> $GITHUB_OUTPUT
          echo "Ingest layer ARN: $LAYER_ARN"

      - name: Build query layer
        run: |
          mkdir -p layers/query/python
          pip install \
            -r lambdas/query/requirements.txt \
            -t layers/query/python/ \
            --upgrade
          cd layers/query
          zip -r ../../query-layer.zip python/
          echo "Query layer size:"
          du -sh ../../query-layer.zip

      - name: Publish query layer to AWS
        id: publish-query-layer
        run: |
          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name rag-chatbot-query-deps \
            --zip-file fileb://query-layer.zip \
            --compatible-runtimes python3.11 \
            --region us-east-1 \
            --query 'LayerVersionArn' \
            --output text)
          echo "layer_arn=$LAYER_ARN" >> $GITHUB_OUTPUT
          echo "Query layer ARN: $LAYER_ARN"

  deploy-ingest-lambda:
    name: Deploy Ingest Lambda
    runs-on: ubuntu-latest
    needs: deploy-lambda-layer   # Wait for layer to be published first

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::449112697282:role/RagChatbotGitHubActionsRole
          aws-region: us-east-1

      - name: Zip handler only (no dependencies)
        run: |
          cd lambdas/ingest
          zip function.zip handler.py
          echo "Function zip size:"
          du -sh function.zip

      - name: Deploy function code
        run: |
          aws lambda update-function-code \
            --function-name rag-chatbot-ingest \
            --zip-file fileb://lambdas/ingest/function.zip \
            --region us-east-1

      - name: Attach layer to function
        run: |
          aws lambda update-function-configuration \
            --function-name rag-chatbot-ingest \
            --layers ${{ needs.deploy-lambda-layer.outputs.ingest_layer_arn }} \
            --region us-east-1

      - name: Verify deployment
        run: |
          aws lambda get-function \
            --function-name rag-chatbot-ingest \
            --query 'Configuration.LastModified' \
            --region us-east-1

  deploy-query-lambda:
    name: Deploy Query Lambda
    runs-on: ubuntu-latest
    needs: deploy-lambda-layer   # Wait for layer to be published first

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::449112697282:role/RagChatbotGitHubActionsRole
          aws-region: us-east-1

      - name: Zip handler only (no dependencies)
        run: |
          cd lambdas/query
          zip function.zip handler.py
          echo "Function zip size:"
          du -sh function.zip

      - name: Deploy function code
        run: |
          aws lambda update-function-code \
            --function-name rag-chatbot-query \
            --zip-file fileb://lambdas/query/function.zip \
            --region us-east-1

      - name: Attach layer to function
        run: |
          aws lambda update-function-configuration \
            --function-name rag-chatbot-query \
            --layers ${{ needs.deploy-lambda-layer.outputs.query_layer_arn }} \
            --region us-east-1

      - name: Verify deployment
        run: |
          aws lambda get-function \
            --function-name rag-chatbot-query \
            --query 'Configuration.LastModified' \
            --region us-east-1