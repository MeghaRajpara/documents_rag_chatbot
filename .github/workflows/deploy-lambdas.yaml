name: Deploy Lambda Functions

on:
  push:
    branches:
      - main
    paths:
      - 'lambdas/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-ingest-lambda:
    name: Deploy Ingest Lambda
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::449112697282:role/RagChatbotGitHubActionsRole
          aws-region: us-east-1

      - name: Install dependencies
        run: |
          cd lambdas/ingest
          pip install -r requirements.txt -t package/ --upgrade

      - name: Zip function
        run: |
          cd lambdas/ingest
          cp handler.py package/
          cd package && zip -r ../function.zip .

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name rag-chatbot-ingest \
            --zip-file fileb://lambdas/ingest/function.zip \
            --region us-east-1

      - name: Verify deployment
        run: |
          aws lambda get-function \
            --function-name rag-chatbot-ingest \
            --query 'Configuration.LastModified' \
            --region us-east-1

  deploy-query-lambda:
    name: Deploy Query Lambda
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::449112697282:role/RagChatbotGitHubActionsRole
          aws-region: us-east-1

      - name: Install dependencies
        run: |
          cd lambdas/query
          pip install -r requirements.txt -t package/ --upgrade

      - name: Zip function
        run: |
          cd lambdas/query
          cp handler.py package/
          cd package && zip -r ../function.zip .

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name rag-chatbot-query \
            --zip-file fileb://lambdas/query/function.zip \
            --region us-east-1

      - name: Verify deployment
        run: |
          aws lambda get-function \
            --function-name rag-chatbot-query \
            --query 'Configuration.LastModified' \
            --region us-east-1
