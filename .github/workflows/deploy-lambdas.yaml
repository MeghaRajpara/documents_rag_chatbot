name: Deploy Lambda Functions

on:
  push:
    branches:
      - main
    paths:
      - 'lambdas/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-ingest-lambda:
    name: Deploy Ingest Lambda
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/RagChatbotGitHubActionsRole
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push ingest image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/rag-chatbot-ingest:$IMAGE_TAG \
            lambdas/ingest/
          docker tag $ECR_REGISTRY/rag-chatbot-ingest:$IMAGE_TAG \
                     $ECR_REGISTRY/rag-chatbot-ingest:latest
          docker push $ECR_REGISTRY/rag-chatbot-ingest:$IMAGE_TAG
          docker push $ECR_REGISTRY/rag-chatbot-ingest:latest

      - name: Update Lambda to use new image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws lambda update-function-code \
            --function-name rag-chatbot-ingest \
            --image-uri $ECR_REGISTRY/rag-chatbot-ingest:$IMAGE_TAG \
            --region ${{ vars.AWS_REGION }}

      - name: Wait for Lambda update to complete
        run: |
          aws lambda wait function-updated \
            --function-name rag-chatbot-ingest \
            --region ${{ vars.AWS_REGION }}
          echo "Ingest Lambda updated successfully ✅"

  deploy-query-lambda:
    name: Deploy Query Lambda
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/RagChatbotGitHubActionsRole
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push query image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/rag-chatbot-query:$IMAGE_TAG \
            lambdas/query/
          docker tag $ECR_REGISTRY/rag-chatbot-query:$IMAGE_TAG \
                     $ECR_REGISTRY/rag-chatbot-query:latest
          docker push $ECR_REGISTRY/rag-chatbot-query:$IMAGE_TAG
          docker push $ECR_REGISTRY/rag-chatbot-query:latest

      - name: Update Lambda to use new image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws lambda update-function-code \
            --function-name rag-chatbot-query \
            --image-uri $ECR_REGISTRY/rag-chatbot-query:$IMAGE_TAG \
            --region ${{ vars.AWS_REGION }}

      - name: Wait for Lambda update to complete
        run: |
          aws lambda wait function-updated \
            --function-name rag-chatbot-query \
            --region ${{ vars.AWS_REGION }}
          echo "Query Lambda updated successfully ✅"