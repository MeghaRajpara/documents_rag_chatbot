name: Deploy Frontend to ECS

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-frontend:
    name: Build and Deploy Frontend to ECS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/RagChatbotGitHubActionsRole
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/rag-chatbot-frontend:$IMAGE_TAG \
            frontend/
          docker tag $ECR_REGISTRY/rag-chatbot-frontend:$IMAGE_TAG \
                     $ECR_REGISTRY/rag-chatbot-frontend:latest
          docker push $ECR_REGISTRY/rag-chatbot-frontend:$IMAGE_TAG
          docker push $ECR_REGISTRY/rag-chatbot-frontend:latest

      - name: Update ECS service with new image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws ecs update-service \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --service ${{ vars.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ vars.AWS_REGION }}

      - name: Wait for ECS deployment to complete
        run: |
          aws ecs wait services-stable \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --services ${{ vars.ECS_SERVICE }} \
            --region ${{ vars.AWS_REGION }}
          echo "✅ ECS deployment complete"
