name: Deploy Frontend to ECS

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'   # Only triggers when frontend code changes
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-frontend:
    name: Build and Push Frontend Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/RagChatbotGitHubActionsRole
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/rag-chatbot-frontend:$IMAGE_TAG \
            frontend/
          docker tag $ECR_REGISTRY/rag-chatbot-frontend:$IMAGE_TAG \
                     $ECR_REGISTRY/rag-chatbot-frontend:latest
          docker push $ECR_REGISTRY/rag-chatbot-frontend:$IMAGE_TAG
          docker push $ECR_REGISTRY/rag-chatbot-frontend:latest

      - name: Confirm image pushed
        run: |
          echo "✅ Frontend image pushed to ECR"
          echo "Image: ${{ steps.login-ecr.outputs.registry }}/rag-chatbot-frontend:${{ github.sha }}"
